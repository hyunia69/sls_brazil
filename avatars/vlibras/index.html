<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLibras Avatar Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', monospace; overflow: hidden; }

        #viewport { width: 100vw; height: 100vh; }

        #panel {
            position: fixed; top: 15px; left: 15px;
            background: rgba(0,0,0,0.85); padding: 20px; border-radius: 12px;
            min-width: 280px; z-index: 10; border: 1px solid #333;
        }
        #panel h2 { color: #4fc3f7; margin-bottom: 12px; font-size: 16px; }
        #panel h3 { color: #81c784; margin: 12px 0 8px; font-size: 13px; }

        .avatar-btn {
            display: inline-block; padding: 8px 16px; margin: 3px;
            background: #16213e; border: 2px solid #0f3460; border-radius: 6px;
            color: #eee; cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        .avatar-btn:hover { background: #1a3a6e; }
        .avatar-btn.active { background: #0f3460; border-color: #4fc3f7; color: #4fc3f7; }

        .tex-row {
            display: flex; align-items: center; gap: 8px; margin: 4px 0;
            font-size: 12px;
        }
        .tex-row input[type="checkbox"] { accent-color: #4fc3f7; }
        .tex-row .tex-name { flex: 1; }
        .tex-preview {
            width: 24px; height: 24px; border-radius: 3px;
            border: 1px solid #555; background-size: cover;
        }

        #status {
            position: fixed; bottom: 15px; left: 15px;
            background: rgba(0,0,0,0.8); padding: 10px 18px; border-radius: 8px;
            font-size: 12px; color: #aaa; z-index: 10;
        }

        #info-panel {
            position: fixed; top: 15px; right: 15px;
            background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px;
            min-width: 200px; z-index: 10; border: 1px solid #333; font-size: 12px;
        }
        #info-panel h3 { color: #ffb74d; margin-bottom: 8px; font-size: 13px; }
        .info-row { display: flex; justify-content: space-between; margin: 3px 0; }
        .info-label { color: #999; }
        .info-value { color: #eee; }

        #controls-bar {
            position: fixed; bottom: 15px; right: 15px;
            background: rgba(0,0,0,0.8); padding: 10px 18px; border-radius: 8px;
            z-index: 10; display: flex; gap: 12px; align-items: center; font-size: 12px;
        }
        #controls-bar label { color: #aaa; }
        #controls-bar input[type="checkbox"] { accent-color: #4fc3f7; }
    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="viewport"></div>

    <div id="panel">
        <h2>VLibras Avatar Viewer</h2>
        <h3>Avatar</h3>
        <div id="avatar-buttons">
            <button class="avatar-btn active" data-avatar="icaro">Icaro</button>
            <button class="avatar-btn" data-avatar="hozana">Hozana</button>
            <button class="avatar-btn" data-avatar="guga">Guga</button>
        </div>
        <h3>Textures</h3>
        <div id="texture-list">Loading...</div>
    </div>

    <div id="info-panel">
        <h3>Model Info</h3>
        <div id="model-info">Select an avatar...</div>
    </div>

    <div id="controls-bar">
        <label><input type="checkbox" id="chk-wireframe"> Wireframe</label>
        <label><input type="checkbox" id="chk-skeleton"> Skeleton</label>
        <label><input type="checkbox" checked id="chk-rotate"> Auto Rotate</label>
        <label><input type="checkbox" checked id="chk-grid"> Grid</label>
    </div>

    <div id="status">Ready</div>

    <script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

const AVATARS = {
    icaro: {
        name: 'Icaro',
        fbx: 'icaro/Icaro_NovoEstilo.fbx',
        textures: {
            'PeleTex': 'icaro/Textures/PeleTex.png',
            'cabelo': 'icaro/Textures/cabelo.png',
            'Camisa': 'icaro/Textures/Camisa.png',
            'camisaestampa': 'icaro/Textures/camisaestampa.png',
            'calca': 'icaro/Textures/calca.png',
            'olhoTex': 'icaro/Textures/olhoTex.png',
        }
    },
    hozana: {
        name: 'Hozana',
        fbx: 'hozana/Hozana2.0.fbx',
        textures: {
            'H_PeleTex': 'hozana/Textures/H_PeleTex.png',
            'HozcabeloTex': 'hozana/Textures/HozcabeloTex.png',
            'camisaTex': 'hozana/Textures/camisaTex.png',
            'camisaestampa': 'hozana/Textures/camisaestampa.png',
            'CalcaTex': 'hozana/Textures/CalcaTex.png',
            'olhoTex': 'hozana/Textures/olhoTex.png',
        }
    },
    guga: {
        name: 'Guga',
        fbx: 'guga/GuGa.fbx',
        textures: {
            'peleTex': 'guga/Textures/peleTex.png',
            'cabeloTex': 'guga/Textures/cabeloTex.png',
            'camisaTex': 'guga/Textures/camisaTex.png',
            'camisaestampa': 'guga/Textures/camisaestampa.png',
            'calcaTex': 'guga/Textures/calcaTex.png',
            'olhoTex': 'guga/Textures/olhoTex.png',
        }
    }
};

// Scene setup
const container = document.getElementById('viewport');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 100, 250);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 80, 0);
controls.enableDamping = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.5;
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.8);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(100, 200, 150);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);

const backLight = new THREE.DirectionalLight(0x6688cc, 0.4);
backLight.position.set(-100, 100, -100);
scene.add(backLight);

const fillLight = new THREE.DirectionalLight(0xcc8866, 0.3);
fillLight.position.set(0, 50, -150);
scene.add(fillLight);

// Grid
const grid = new THREE.GridHelper(400, 20, 0x333355, 0x222244);
scene.add(grid);

// Axes
const axes = new THREE.AxesHelper(50);
scene.add(axes);

// State
let currentModel = null;
let skeletonHelper = null;
let currentAvatarKey = null;
const textureCache = {};
const textureLoader = new THREE.TextureLoader();
const fbxLoader = new FBXLoader();

// Material tracking - maps mesh name/material name to material references and their original textures
let meshMaterials = [];

function setStatus(msg) {
    document.getElementById('status').textContent = msg;
}

function showModelInfo(model, avatarKey) {
    let meshCount = 0, vertexCount = 0, boneCount = 0, materialCount = 0;
    const materialNames = new Set();
    const meshDetails = [];

    model.traverse(obj => {
        if (obj.isMesh) {
            meshCount++;
            vertexCount += obj.geometry.attributes.position?.count || 0;
            const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
            mats.forEach(m => materialNames.add(m.name || 'unnamed'));
            meshDetails.push({
                name: obj.name,
                vertices: obj.geometry.attributes.position?.count || 0,
                materials: mats.map(m => m.name || 'unnamed')
            });
        }
        if (obj.isBone) boneCount++;
    });

    materialCount = materialNames.size;

    let html = `
        <div class="info-row"><span class="info-label">Avatar:</span><span class="info-value">${AVATARS[avatarKey].name}</span></div>
        <div class="info-row"><span class="info-label">Meshes:</span><span class="info-value">${meshCount}</span></div>
        <div class="info-row"><span class="info-label">Vertices:</span><span class="info-value">${vertexCount.toLocaleString()}</span></div>
        <div class="info-row"><span class="info-label">Bones:</span><span class="info-value">${boneCount}</span></div>
        <div class="info-row"><span class="info-label">Materials:</span><span class="info-value">${materialCount}</span></div>
        <h3 style="color:#81c784;margin:10px 0 5px;font-size:12px;">Meshes</h3>
    `;
    for (const md of meshDetails) {
        html += `<div style="margin:2px 0;font-size:11px;color:#ccc;">${md.name} (${md.vertices} verts) - ${md.materials.join(', ')}</div>`;
    }

    document.getElementById('model-info').innerHTML = html;
}

function buildTextureUI(avatarKey) {
    const avatar = AVATARS[avatarKey];
    const listEl = document.getElementById('texture-list');
    listEl.innerHTML = '';

    // Collect actual materials from the model
    meshMaterials = [];
    if (currentModel) {
        currentModel.traverse(obj => {
            if (obj.isMesh) {
                const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
                for (const mat of mats) {
                    meshMaterials.push({ mesh: obj, material: mat, originalMap: mat.map });
                }
            }
        });
    }

    // Build texture checkboxes from avatar texture definitions
    for (const [texName, texPath] of Object.entries(avatar.textures)) {
        const row = document.createElement('div');
        row.className = 'tex-row';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = true;
        cb.dataset.texName = texName;
        cb.dataset.texPath = texPath;
        cb.addEventListener('change', () => toggleTexture(texName, texPath, cb.checked));

        const nameSpan = document.createElement('span');
        nameSpan.className = 'tex-name';
        nameSpan.textContent = texName;

        const preview = document.createElement('div');
        preview.className = 'tex-preview';
        preview.style.backgroundImage = `url(${texPath})`;

        row.appendChild(cb);
        row.appendChild(nameSpan);
        row.appendChild(preview);
        listEl.appendChild(row);
    }

    // Also list materials found in the model that have maps
    if (meshMaterials.length > 0) {
        const matHeader = document.createElement('div');
        matHeader.style.cssText = 'margin-top:10px;color:#ffb74d;font-size:11px;';
        matHeader.textContent = `Model materials (${meshMaterials.length}):`;
        listEl.appendChild(matHeader);

        const seen = new Set();
        for (const mm of meshMaterials) {
            const name = mm.material.name || 'unnamed';
            if (seen.has(name)) continue;
            seen.add(name);
            const matRow = document.createElement('div');
            matRow.style.cssText = 'font-size:11px;color:#999;margin:1px 0;';
            matRow.textContent = `  ${name} ${mm.material.map ? '(has texture)' : '(no texture)'}`;
            listEl.appendChild(matRow);
        }
    }
}

function toggleTexture(texName, texPath, enabled) {
    if (!currentModel) return;

    const texNameLower = texName.toLowerCase();

    currentModel.traverse(obj => {
        if (!obj.isMesh) return;
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        for (const mat of mats) {
            const matNameLower = (mat.name || '').toLowerCase();
            // Match texture to material by name similarity
            if (matNameLower.includes(texNameLower) ||
                texNameLower.includes(matNameLower) ||
                matNameLower.replace(/[_\-\.]/g, '').includes(texNameLower.replace(/[_\-\.]/g, ''))) {
                if (enabled) {
                    if (!mat.map) {
                        // Load and apply texture
                        loadTexture(texPath).then(tex => {
                            mat.map = tex;
                            mat.needsUpdate = true;
                        });
                    }
                } else {
                    mat.map = null;
                    mat.needsUpdate = true;
                }
            }
        }
    });

    // Also try matching by checking if any material's existing texture filename matches
    if (enabled) {
        loadTexture(texPath).then(tex => {
            currentModel.traverse(obj => {
                if (!obj.isMesh) return;
                const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
                for (const mat of mats) {
                    // If material has no map and we haven't assigned one yet
                    const origEntry = meshMaterials.find(mm => mm.material === mat);
                    if (origEntry && origEntry.originalMap) {
                        const origName = (origEntry.originalMap.name || origEntry.originalMap.sourceFile || '').toLowerCase();
                        if (origName.includes(texNameLower)) {
                            mat.map = enabled ? tex : null;
                            mat.needsUpdate = true;
                        }
                    }
                }
            });
        });
    }
}

function loadTexture(path) {
    if (textureCache[path]) return Promise.resolve(textureCache[path]);
    return new Promise((resolve, reject) => {
        textureLoader.load(path, tex => {
            tex.flipY = false; // FBX textures typically need this
            tex.colorSpace = THREE.SRGBColorSpace;
            textureCache[path] = tex;
            resolve(tex);
        }, undefined, reject);
    });
}

async function loadAvatar(avatarKey) {
    if (currentAvatarKey === avatarKey) return;
    currentAvatarKey = avatarKey;

    const avatar = AVATARS[avatarKey];
    setStatus(`Loading ${avatar.name}...`);

    // Remove previous model
    if (currentModel) {
        scene.remove(currentModel);
        currentModel = null;
    }
    if (skeletonHelper) {
        scene.remove(skeletonHelper);
        skeletonHelper = null;
    }

    // Update button states
    document.querySelectorAll('.avatar-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.avatar === avatarKey);
    });

    try {
        const model = await new Promise((resolve, reject) => {
            fbxLoader.load(avatar.fbx, resolve,
                (xhr) => {
                    if (xhr.total) setStatus(`Loading ${avatar.name}... ${Math.round(xhr.loaded/xhr.total*100)}%`);
                },
                reject
            );
        });

        currentModel = model;
        scene.add(model);

        // Create skeleton helper (hidden by default)
        skeletonHelper = new THREE.SkeletonHelper(model);
        skeletonHelper.visible = document.getElementById('chk-skeleton').checked;
        scene.add(skeletonHelper);

        // Auto-frame camera
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        console.log(`Model bounds: center(${center.x.toFixed(1)},${center.y.toFixed(1)},${center.z.toFixed(1)}) size(${size.x.toFixed(1)},${size.y.toFixed(1)},${size.z.toFixed(1)}) maxDim=${maxDim.toFixed(1)}`);

        camera.far = maxDim * 10;
        camera.near = maxDim * 0.001;
        camera.updateProjectionMatrix();

        controls.target.copy(center);
        camera.position.set(center.x + maxDim * 0.3, center.y, center.z + maxDim * 1.8);
        controls.update();

        // Show info and build texture UI
        showModelInfo(model, avatarKey);
        buildTextureUI(avatarKey);

        setStatus(`${avatar.name} loaded - ${model.children.length} objects`);

    } catch (err) {
        setStatus(`Error loading ${avatar.name}: ${err.message}`);
        console.error(err);
    }
}

// UI event handlers
document.querySelectorAll('.avatar-btn').forEach(btn => {
    btn.addEventListener('click', () => loadAvatar(btn.dataset.avatar));
});

document.getElementById('chk-wireframe').addEventListener('change', (e) => {
    if (!currentModel) return;
    currentModel.traverse(obj => {
        if (obj.isMesh) {
            const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
            mats.forEach(m => { m.wireframe = e.target.checked; });
        }
    });
});

document.getElementById('chk-skeleton').addEventListener('change', (e) => {
    if (skeletonHelper) skeletonHelper.visible = e.target.checked;
});

document.getElementById('chk-rotate').addEventListener('change', (e) => {
    controls.autoRotate = e.target.checked;
});

document.getElementById('chk-grid').addEventListener('change', (e) => {
    grid.visible = e.target.checked;
    axes.visible = e.target.checked;
});

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Render loop
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();

// Load default avatar
loadAvatar('icaro');

    </script>
</body>
</html>
